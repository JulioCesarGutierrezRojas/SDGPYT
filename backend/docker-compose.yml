version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sdgpyt-postgres
    environment:
      POSTGRES_DB: jira
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres-admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./add_fcm_token_column.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - sdgpyt-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sdgpyt-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database configuration
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: jira
      DB_USER: postgres
      DB_PASSWORD: postgres-admin
      
      # JWT Configuration
      JWT_SECRET: 3m6B9epqA2dX5gYrKvPwS8zUyLxJhN4cRfT7kWtZnQ0MbG1VlCsOaD4Ie5FoHj
      JWT_EXPIRATION: 86400
      
      # Email Configuration
      EMAIL_HOST: smtp.gmail.com
      EMAIL_PORT: 587
      EMAIL_USERNAME: 20203tn160@utez.edu.mx
      EMAIL_PASSWORD: rksh jrdo pijg rmqv
    ports:
      - "8081:8081"
    networks:
      - sdgpyt-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
    driver: local

networks:
  sdgpyt-network:
    driver: bridge
